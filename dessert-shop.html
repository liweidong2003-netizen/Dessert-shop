<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>甜光 · Handmade Desserts · Kézműves Desszertek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F7F4EF;
    --surface:#FFFFFF;
    --ink:#2A2522;
    --ink-soft:#6B6358;
    --ink-faint:#A39A8C;
    --accent:#A5573E;
    --accent-soft:#F1E3DC;
    --sage:#8B9A7B;
    --sage-soft:#EBEFE5;
    --line:#E6E0D6;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .serif{font-family:'Fraunces',serif;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea,select{font-family:inherit;}

  /* ---------- shell ---------- */
  .shell{max-width:1080px;margin:0 auto;padding:0 24px;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:28px 0;border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand-mark{font-family:'Fraunces',serif;font-weight:500;font-size:26px;letter-spacing:0.04em;}
  .brand-tag{font-size:13px;color:var(--ink-soft);letter-spacing:0.02em;}
  .cart-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:10px 18px;font-size:14px;font-weight:500;
    color:var(--ink);transition:border-color .15s;
  }
  .cart-btn:hover{border-color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .lang-switch{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface);}
  .lang-opt{
    border:none;background:transparent;padding:8px 12px;font-size:12px;font-weight:500;
    color:var(--ink-soft);transition:all .15s;letter-spacing:0.02em;
  }
  .lang-opt:hover{color:var(--accent);}
  .lang-opt.active{background:var(--ink);color:var(--surface);}
  .cart-count{
    background:var(--accent);color:#fff;border-radius:999px;
    min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;padding:0 5px;
  }

  /* ---------- hero ---------- */
  .hero{padding:64px 0 40px;}
  .hero h1{
    font-family:'Fraunces',serif;font-weight:400;font-size:44px;
    line-height:1.25;margin:0 0 16px;letter-spacing:0.01em;
    max-width:600px;
  }
  .hero p{font-size:15px;color:var(--ink-soft);max-width:480px;line-height:1.8;margin:0;}
  .hero-rule{width:48px;height:2px;background:var(--accent);margin:24px 0;}

  /* ---------- product grid ---------- */
  .section-label{
    font-size:12px;letter-spacing:0.18em;text-transform:uppercase;
    color:var(--ink-faint);margin:0 0 24px;font-weight:500;
  }
  .grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:28px;padding-bottom:80px;
  }
  .card{
    display:flex;flex-direction:column;
  }
  .card-media{
    aspect-ratio:4/3;border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:16px;overflow:hidden;position:relative;
    background:var(--swatch,var(--accent-soft));
  }
  .card-media img{width:100%;height:100%;object-fit:cover;}
  .card-media .glyph{
    font-family:'Fraunces',serif;font-size:40px;font-weight:400;
    color:rgba(0,0,0,0.18);
  }
  .card-sold{
    position:absolute;inset:0;background:rgba(247,244,239,0.78);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;color:var(--ink-soft);letter-spacing:0.1em;
  }
  .card-body{display:flex;flex-direction:column;flex:1;}
  .card-title-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:6px;}
  .card-title{font-family:'Fraunces',serif;font-size:19px;font-weight:500;margin:0;}
  .card-price{font-size:15px;font-weight:600;color:var(--accent);white-space:nowrap;}
  .card-desc{font-size:13px;color:var(--ink-soft);line-height:1.7;margin:0 0 18px;flex:1;}
  .card-add{
    border:1px solid var(--ink);background:transparent;color:var(--ink);
    border-radius:999px;padding:10px 0;font-size:13px;font-weight:500;
    letter-spacing:0.06em;transition:all .15s;
  }
  .card-add:hover{background:var(--ink);color:var(--surface);}
  .card-add:disabled{border-color:var(--line);color:var(--ink-faint);cursor:default;}
  .card-add:disabled:hover{background:transparent;color:var(--ink-faint);}

  /* ---------- footer ---------- */
  .footer{
    border-top:1px solid var(--line);padding:28px 0 40px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:12px;color:var(--ink-faint);
  }
  .footer a{color:var(--ink-faint);text-decoration:none;}
  .footer a:hover{color:var(--accent);}

  /* ---------- cart drawer ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(42,37,34,0.35);
    opacity:0;visibility:hidden;transition:opacity .25s;z-index:40;
  }
  .overlay.open{opacity:1;visibility:visible;}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(440px,100%);
    background:var(--surface);z-index:41;
    transform:translateX(100%);transition:transform .3s ease;
    display:flex;flex-direction:column;
  }
  .drawer.open{transform:translateX(0);}
  .drawer-head{
    padding:28px 28px 20px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
  }
  .drawer-head h2{font-family:'Fraunces',serif;font-size:22px;font-weight:500;margin:0;}
  .drawer-close{background:none;border:none;font-size:22px;color:var(--ink-soft);line-height:1;padding:4px;}
  .drawer-body{flex:1;overflow-y:auto;padding:8px 28px;}
  .ticket-item{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:16px 0;border-bottom:1px dashed var(--line);
  }
  .ticket-item:last-child{border-bottom:none;}
  .ticket-name{font-family:'Fraunces',serif;font-size:15px;font-weight:500;margin:0 0 4px;}
  .ticket-price{font-size:12px;color:var(--ink-soft);}
  .qty-control{display:flex;align-items:center;gap:10px;}
  .qty-btn{
    width:26px;height:26px;border-radius:50%;border:1px solid var(--line);
    background:var(--surface);font-size:14px;display:flex;align-items:center;justify-content:center;
    color:var(--ink);
  }
  .qty-btn:hover{border-color:var(--accent);color:var(--accent);}
  .qty-num{font-size:13px;font-weight:600;min-width:18px;text-align:center;}
  .empty-cart{padding:60px 0;text-align:center;color:var(--ink-faint);font-size:13px;}

  .drawer-foot{border-top:1px solid var(--line);padding:20px 28px 28px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:0.04em;}
  .field input,.field textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-size:14px;background:var(--bg);color:var(--ink);
    outline:none;transition:border-color .15s;
  }
  .field input:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:60px;}
  .pay-options{display:flex;gap:8px;}
  .pay-opt{
    flex:1;border:1px solid var(--line);border-radius:8px;padding:10px 6px;
    text-align:center;font-size:12px;cursor:pointer;transition:all .15s;
    background:var(--bg);
  }
  .pay-opt.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600;}
  .total-row{
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:'Fraunces',serif;font-size:18px;margin:18px 0;
    padding-top:14px;border-top:1px solid var(--ink);
  }
  .submit-btn{
    width:100%;background:var(--ink);color:var(--surface);border:none;
    border-radius:999px;padding:14px;font-size:14px;font-weight:600;
    letter-spacing:0.06em;transition:background .15s;
  }
  .submit-btn:hover{background:var(--accent);}
  .submit-btn:disabled{background:var(--line);color:var(--ink-faint);cursor:default;}
  .hint{font-size:11px;color:var(--ink-faint);margin-top:8px;line-height:1.6;}

  /* ---------- confirmation ---------- */
  .confirm-screen{padding:48px 28px;text-align:center;}
  .confirm-icon{
    width:56px;height:56px;border-radius:50%;background:var(--sage-soft);
    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
    color:var(--sage);font-size:24px;
  }
  .confirm-screen h3{font-family:'Fraunces',serif;font-size:20px;margin:0 0 8px;}
  .confirm-screen p{font-size:13px;color:var(--ink-soft);line-height:1.7;margin:0 0 24px;}
  .confirm-id{
    display:inline-block;font-size:12px;background:var(--bg);
    border:1px solid var(--line);border-radius:8px;padding:8px 16px;
    color:var(--ink-soft);letter-spacing:0.06em;margin-bottom:24px;
  }

  /* ---------- admin ---------- */
  .admin-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:24px 0;border-bottom:1px solid var(--line);
  }
  .admin-tabs{display:flex;gap:4px;}
  .admin-tab{
    border:1px solid var(--line);background:var(--surface);
    border-radius:999px;padding:8px 18px;font-size:13px;font-weight:500;
    color:var(--ink-soft);
  }
  .admin-tab.active{background:var(--ink);color:var(--surface);border-color:var(--ink);}
  .admin-section{padding:32px 0 80px;}
  .order-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 24px;margin-bottom:14px;
  }
  .order-card.is-new{border-color:var(--accent);}
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
  .order-meta{font-size:12px;color:var(--ink-faint);margin:2px 0 12px;}
  .order-name{font-family:'Fraunces',serif;font-size:17px;font-weight:500;margin:0;}
  .order-status{
    font-size:11px;font-weight:600;letter-spacing:0.08em;padding:5px 12px;
    border-radius:999px;text-transform:uppercase;border:none;
  }
  .status-pending{background:var(--accent-soft);color:var(--accent);}
  .status-done{background:var(--sage-soft);color:var(--sage);}
  .order-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--ink-soft);}
  .order-row b{color:var(--ink);font-weight:500;}
  .order-items{margin:12px 0;padding:12px 0;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line);}
  .order-item-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
  .order-note{
    background:var(--bg);border-radius:8px;padding:10px 14px;font-size:13px;
    margin:10px 0;color:var(--ink);
  }
  .order-note b{color:var(--accent);}
  .order-actions{display:flex;gap:8px;margin-top:14px;}
  .mini-btn{
    border:1px solid var(--line);background:var(--surface);border-radius:8px;
    padding:8px 16px;font-size:12px;font-weight:500;color:var(--ink-soft);
  }
  .mini-btn:hover{border-color:var(--ink);color:var(--ink);}
  .mini-btn.danger:hover{border-color:var(--accent);color:var(--accent);}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--ink-faint);font-size:13px;
    border:1px dashed var(--line);border-radius:var(--radius);
  }

  .prod-edit-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;margin-bottom:14px;display:grid;grid-template-columns:80px 1fr;gap:16px;
  }
  .prod-swatch{
    width:80px;height:80px;border-radius:10px;background:var(--swatch,var(--accent-soft));
  }
  .prod-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .prod-grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;}
  .small-input{
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    font-size:13px;background:var(--bg);color:var(--ink);width:100%;outline:none;
  }
  .small-input:focus{border-color:var(--accent);}
  .small-label{font-size:11px;color:var(--ink-faint);margin-bottom:4px;display:block;}
  .add-product-btn{
    width:100%;border:1px dashed var(--line);background:transparent;
    border-radius:var(--radius);padding:16px;font-size:13px;color:var(--ink-soft);font-weight:500;
  }
  .add-product-btn:hover{border-color:var(--accent);color:var(--accent);}

  .gate{
    max-width:360px;margin:120px auto;text-align:center;
  }
  .gate h2{font-family:'Fraunces',serif;font-size:24px;margin:0 0 8px;}
  .gate p{font-size:13px;color:var(--ink-soft);margin:0 0 24px;}

  .toggle-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 20px;margin-bottom:14px;
  }
  .toggle-row div p{margin:0;}
  .toggle-row .t-title{font-size:14px;font-weight:500;margin-bottom:2px;}
  .toggle-row .t-desc{font-size:12px;color:var(--ink-soft);}
  .switch{
    position:relative;width:44px;height:24px;border-radius:999px;background:var(--line);
    border:none;transition:background .15s;flex-shrink:0;
  }
  .switch.on{background:var(--sage);}
  .switch::after{
    content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;
    border-radius:50%;background:#fff;transition:left .15s;
  }
  .switch.on::after{left:23px;}

  @media (max-width:640px){
    .topbar{flex-direction:column;align-items:flex-start;gap:16px;}
    .topbar-right{width:100%;justify-content:space-between;}
    .hero h1{font-size:32px;}
    .drawer{width:100%;}
    .prod-edit-card{grid-template-columns:1fr;}
    .prod-swatch{width:100%;height:120px;}
  }
</style>
</head>

function pf(field){
  // resolve a possibly-multilingual field to current language
  if(field && typeof field === 'object') return field[lang] || field.zh || field.en || '';
  return field || '';
}

/* ============ storage: 商品 (Supabase 表 products) ============ */
/* 表结构: id text 主键, data jsonb (存整条商品), sort int */
async function getProducts(){
  if(sbReady){
    try{
      const {data, error} = await sb.from('products').select('id,data,sort').order('sort',{ascending:true});
      if(error) throw error;
      if(data && data.length){
        return data.map(row => ({...row.data, id: row.id}));
      }
      // 表为空 → 写入默认商品做初始化
      await seedProducts();
      return DEFAULT_PRODUCTS;
    }catch(e){
      console.error('getProducts', e);
      return DEFAULT_PRODUCTS;
    }
  }
  return DEFAULT_PRODUCTS;
}
async function seedProducts(){
  if(!sbReady) return;
  const rows = DEFAULT_PRODUCTS.map((p,i)=>({id:p.id, data:p, sort:i}));
  try{ await sb.from('products').upsert(rows); }catch(e){ console.error('seed', e); }
}
async function saveProducts(list){
  if(!sbReady) return;
  const rows = list.map((p,i)=>({id:p.id, data:p, sort:i}));
  try{
    await sb.from('products').upsert(rows);
    // 删除已不在列表里的商品
    const ids = list.map(p=>p.id);
    const {data} = await sb.from('products').select('id');
    if(data){
      const toDelete = data.filter(r=>!ids.includes(r.id)).map(r=>r.id);
      if(toDelete.length) await sb.from('products').delete().in('id', toDelete);
    }
  }catch(e){ console.error('saveProducts', e); }
}

async function getOrders(){
  if(sbReady){
    try{
      const {data, error} = await sb.from('orders').select('id,data,created_at').order('created_at',{ascending:true});
      if(error) throw error;
      if(data) return data.map(row => ({...row.data, id: row.id}));
    }catch(e){ console.error('getOrders', e); }
  }
  return [];
}
async function insertOrder(order){
  if(!sbReady) return;
  try{
    await sb.from('orders').insert({id:order.id, data:order});
  }catch(e){ console.error('insertOrder', e); }
}
async function updateOrder(order){
  if(!sbReady) return;
  try{
    await sb.from('orders').update({data:order}).eq('id', order.id);
  }catch(e){ console.error('updateOrder', e); }
}
async function deleteOrderRow(id){

    await sb.from('orders').delete().eq('id', id);

}

/* ============ utils ============ */
function fmt(n){
  const v = Math.round(Number(n));
  return v.toLocaleString('hu-HU') + ' Ft';
}
function genId(){
  const d = new Date();
  const pad = x => String(x).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
    o.start(); o.stop(ctx.currentTime+0.5);
    setTimeout(()=>{
      const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.type='sine'; o2.frequency.value=1100;
      g2.gain.setValueAtTime(0.001, ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime+0.01);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
      o2.start(); o2.stop(ctx.currentTime+0.5);
    },150);
  }catch(e){}
}

/* ============ admin: main ============ */
function renderAdmin(){
  return `
  <div class="shell">
    <div class="topbar">
      <div class="brand"><span class="brand-mark">${SHOP_NAME}</span><span class="brand-tag">${t('adminBack')}</span></div>

    </div>
    <div class="admin-bar">
      <div class="admin-tabs">

        <button class="admin-tab ${adminTab==='products'?'active':''}" data-tab="products">${t('tabProducts')}</button>

function renderAdminOrdersPlaceholder(){
  return `<div class="empty-state">${t('loadingOrders')}</div>`;
}

async function renderAdminOrders(){
  const allOrders = await getOrders();
  const orders = allOrders.slice().reverse();
  const seen = getSeenCount();
  const content = document.getElementById('admin-content');
  if(!content) return;
  if(orders.length === 0){
    content.innerHTML = `<div class="empty-state">${t('noOrders')}</div>`;
    return;
  }
  const total = allOrders.length;
  content.innerHTML = orders.map((o, idx) => {
    const realIdx = total - 1 - idx;
    const isNew = realIdx >= seen;
    const done = o.status==='done';
    return `
    <div class="order-card ${isNew?'is-new':''}">
      <div class="order-top">
        <div>
          <p class="order-name">${escapeHtml(o.customerName||t('noName'))}</p>
          <p class="order-meta">${t('orderNo')} ${o.id} · ${o.createdAtText||''}</p>
        </div>
        <button class="order-status ${done?'status-done':'status-pending'}" data-toggle-status="${o.id}">
          ${done?t('statusDone'):t('statusPending')}
        </button>
      </div>
      <div class="order-row"><span>${t('contact')}</span><b>${escapeHtml(o.phone||'-')}</b></div>
      <div class="order-row"><span>${t('address')}</span><b>${escapeHtml(o.address||'-')}</b></div>
      <div class="order-row"><span>${t('payment')}</span><b>${escapeHtml(payLabel(o.paymentMethod)||'-')}</b></div>
      <div class="order-items">
        ${o.items.map(i => `<div class="order-item-row"><span>${escapeHtml(pf(i.name))} × ${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
      </div>
      <div class="order-row"><span>${t('total')}</span><b>${fmt(o.total)}</b></div>
      ${o.note ? `<div class="order-note"><b>${t('notePrefix')}</b>${escapeHtml(o.note)}</div>` : ''}
      <div class="order-actions">
        <button class="mini-btn" data-toggle-status="${o.id}">${done?t('markPending'):t('markDone')}</button>
        <button class="mini-btn danger" data-delete-order="${o.id}">${t('delOrder')}</button>
      </div>
    </div>`;
  }).join('');

  setSeenCount(total);
  attachAdminOrderHandlers();
}

/* ============ event handlers ============ */
function attachHandlers(){
  document.querySelectorAll('[data-lang]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      lang = btn.getAttribute('data-lang');
      setLang(lang);
      await render();
    });
  });

  if(view === 'shop'){
    document.getElementById('open-cart')?.addEventListener('click', ()=>{
      cart._open = true; render();
    });
    document.getElementById('close-drawer')?.addEventListener('click', ()=>{
      cart._open = false; window._confirmedOrder = null; render();
    });
    document.getElementById('overlay')?.addEventListener('click', ()=>{
      cart._open = false; window._confirmedOrder = null; render();
    });
    document.getElementById('back-to-shop')?.addEventListener('click', ()=>{
      cart = []; cart._open = false; window._confirmedOrder = null; render();
    });
    document.querySelectorAll('[data-add]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-add');
        const p = products.find(x=>x.id===id);
        const existing = cart.find(x=>x.id===id);
        if(existing) existing.qty++;
        else cart.push({id:p.id, name:p.name, price:p.price, qty:1});
        cart._open = true;
        render();
      });
    });
    document.querySelectorAll('[data-inc]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-inc');
        const item = cart.find(x=>x.id===id);
        item.qty++; render();
      });
    });
    document.querySelectorAll('[data-dec]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-dec');
        const item = cart.find(x=>x.id===id);
        item.qty--;
        if(item.qty<=0) cart = cart.filter(x=>x.id!==id);
        render();
      });
    });
    document.querySelectorAll('[data-pay]').forEach(el=>{
      el.addEventListener('click', ()=>{
        cart._form = cart._form || {};
        cart._form.pay = el.getAttribute('data-pay');
        render();
      });
    });
    document.getElementById('submit-order')?.addEventListener('click', submitOrder);
    const fieldMap = {'f-name':'name','f-phone':'phone','f-address':'address','f-note':'note'};
    Object.keys(fieldMap).forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.addEventListener('input', ()=>{
        cart._form = cart._form || {};
        cart._form[fieldMap[id]] = el.value;
      });
    });
  } else if(view === 'admin'){
    if(!adminUnlocked){
      document.getElementById('admin-enter')?.addEventListener('click', ()=>{
        const code = document.getElementById('admin-code').value;
        if(code === ADMIN_CODE){
          adminUnlocked = true; startPolling(); render();
        } else {
          alert(t('gateWrong'));
        }
      });
      document.getElementById('admin-code')?.addEventListener('keydown', e=>{
        if(e.key==='Enter') document.getElementById('admin-enter').click();
      });
    } else {
      document.querySelectorAll('.admin-tab').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          adminTab = btn.getAttribute('data-tab');
          render();
        });
      });
      if(adminTab === 'orders') renderAdminOrders();
      if(adminTab === 'products') attachAdminProductHandlers();
      if(adminTab === 'settings') attachAdminSettingsHandlers();
    }
  }
}

/* ============ submit order ============ */
async function submitOrder(){
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const address = document.getElementById('f-address').value.trim();
  const note = document.getElementById('f-note').value.trim();
  const pay = cart._form?.pay || 'wechat';

  if(!name || !phone || !address){
    alert(t('fillRequired'));
    return;
  }

  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const order = {
    id: genId(),
    createdAt: Date.now(),
    createdAtText: new Date().toLocaleString(),
    items: cart.map(i=>({id:i.id, name:i.name, price:i.price, qty:i.qty})),
    total,
    customerName: name,
    phone,
    address,
    note,
    paymentMethod: pay,
    status: 'pending'
  };

  await insertOrder(order);

  window._confirmedOrder = order;
  cart = [];
  cart._open = true;
  render();
}

/* ============ admin: orders handlers ============ */
function attachAdminOrderHandlers(){
  document.querySelectorAll('[data-toggle-status]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-toggle-status');
      const orders = await getOrders();
      const o = orders.find(x=>x.id===id);
      if(!o) return;
      o.status = o.status==='done' ? 'pending' : 'done';
      await updateOrder(o);
      await renderAdminOrders();
    });
  });
  document.querySelectorAll('[data-delete-order]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.getAttribute('data-delete-order');
      if(!confirm(t('confirmDelOrder'))) return;
      await deleteOrderRow(id);
      await renderAdminOrders();
    });
  });
}

/* ============ admin: products handlers ============ */
function attachAdminProductHandlers(){
  document.querySelectorAll('.prod-edit-card').forEach(card=>{
    const id = card.getAttribute('data-pid');
    card.querySelectorAll('[data-field]').forEach(input=>{
      const onChange = async ()=>{
        const p = products.find(x=>x.id===id);
        if(!p) return;
        const field = input.getAttribute('data-field');
        if(field === 'available'){ p[field] = input.checked; }
        else if(field === 'price'){ p[field] = parseFloat(input.value) || 0; }
        else if(field === 'name' || field === 'desc'){
          if(!p[field] || typeof p[field] !== 'object') p[field] = {zh:'',en:'',hu:''};
          p[field][lang] = input.value;
        }
        else { p[field] = input.value; }
        await saveProducts(products);
        if(field === 'swatch'){
          card.querySelector('.prod-swatch').style.setProperty('--swatch', input.value);
        }
      };
      input.addEventListener('change', onChange);
      if(input.tagName === 'INPUT' && input.type === 'text'){
        input.addEventListener('blur', onChange);
      }
    });
    card.querySelector('[data-remove-product]')?.addEventListener('click', async ()=>{
      if(!confirm(t('confirmDelProduct'))) return;
      products = products.filter(x=>x.id!==id);
      await saveProducts(products);
      render();
    });
  });
  document.getElementById('add-product')?.addEventListener('click', async ()=>{
    const newP = {id:'p'+Date.now(), name:{zh:t('newProductName'),en:t('newProductName'),hu:t('newProductName')}, desc:{zh:t('newProductDesc'),en:t('newProductDesc'),hu:t('newProductDesc')}, price:0, swatch:'#F1E3DC', available:true};
    products.push(newP);
    await saveProducts(products);
    render();
  });
}

/* ============ admin: settings handlers ============ */
function attachAdminSettingsHandlers(){
  document.getElementById('enable-notif')?.addEventListener('click', async ()=>{
    if(!('Notification' in window)){
      alert(t('notSupported'));
      return;
    }
    const perm = await Notification.requestPermission();
    if(perm === 'granted'){
      startPolling();
      new Notification(t('notifEnabledTitle'), {body:t('notifEnabledBody')});
    }
    render();
  });
  document.getElementById('test-sound')?.addEventListener('click', beep);
}

/* ============ new order polling + 实时订阅 ============ */
let pollTimer = null;
let realtimeSub = null;
function startPolling(){
  // Supabase 实时订阅：顾客一插入订单，后台立刻收到
  if(sbReady && !realtimeSub){
    try{
      realtimeSub = sb.channel('orders-feed')
        .on('postgres_changes', {event:'INSERT', schema:'public', table:'orders'}, async ()=>{
          beep();
          if(('Notification' in window) && Notification.permission === 'granted'){
            const orders = await getOrders();
            const newest = orders[orders.length-1];
            if(newest){
              const itemsStr = newest.items.map(i=>pf(i.name)).join(lang==='zh'?'、':', ');
              new Notification(t('newOrderTitle'), {
                body: t('newOrderBody')(newest.customerName, itemsStr, fmt(newest.total))
              });
            }
          }
          if(view === 'admin' && adminUnlocked && adminTab === 'orders') await renderAdminOrders();
        })
        .subscribe();
    }catch(e){ console.error('realtime', e); }
  }
  // 兜底轮询（实时订阅未生效时仍可用）
  if(pollTimer) return;
  pollTimer = setInterval(async ()=>{
    if(view !== 'admin' || !adminUnlocked) return;
    const orders = await getOrders();
    const seen = getSeenCount();
    if(orders.length > seen){
      beep();
      if(('Notification' in window) && Notification.permission === 'granted'){
        const newest = orders[orders.length-1];
        const itemsStr = newest.items.map(i=>pf(i.name)).join(lang==='zh'?'、':', ');
        new Notification(t('newOrderTitle'), {
          body: t('newOrderBody')(newest.customerName, itemsStr, fmt(newest.total))
        });
      }
      if(adminTab === 'orders') await renderAdminOrders();
    }
  }, 15000);
}

/* ============ init ============ */
async function init(){
  initSupabase();
  lang = getLang();
  if(!sbReady){
    showConfigBanner();
  }
  products = await getProducts();
  view = parseHash();
  cart._open = cart._open || false;
  await render();
}

  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;left:0;right:0;bottom:0;background:#A5573E;color:#fff;padding:12px 20px;font-size:13px;text-align:center;z-index:99;font-family:sans-serif;';
  b.textContent = '⚠️ 尚未配置 Supabase：请在代码顶部填入 SUPABASE_URL 和 SUPABASE_ANON_KEY。当前菜单为默认演示数据，下单不会保存。';
  document.body.appendChild(b);
}
init();
